name: template_vgv_app

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  semantic-pull-request:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/semantic_pull_request.yml@v1

  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      flutter_version: "3.41.x"
      run_bloc_lint: false
      min_coverage: 85
      coverage_excludes: "**/*.g.dart lib/core/firebase/** lib/core/theme/** lib/core/storage/secure_storage.dart"
      setup: cp .env.example .env && dart run build_runner build --delete-conflicting-outputs

  spell-check:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/spell_check.yml@v1
    with:
      includes: |
        **/*.md
      modified_files_only: false
